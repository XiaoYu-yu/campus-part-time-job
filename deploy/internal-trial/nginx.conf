server_tokens off;
limit_req_zone $binary_remote_addr zone=campus_feedback_per_ip:10m rate=6r/m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 8m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    error_page 429 = @feedback_rate_limited;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /api/campus/public/feedback {
        limit_req zone=campus_feedback_per_ip burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location @feedback_rate_limited {
        default_type application/json;
        return 429 '{"code":429,"msg":"反馈提交过于频繁，请稍后再试","data":null}';
    }
}
