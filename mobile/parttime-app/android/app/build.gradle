apply plugin: 'com.android.application'

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
def releaseSigningKeys = ['storeFile', 'storePassword', 'keyAlias', 'keyPassword']
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}
def hasReleaseSigning = keystorePropertiesFile.exists() &&
        releaseSigningKeys.every { key -> keystoreProperties[key]?.toString()?.trim() }
if (keystorePropertiesFile.exists() && !hasReleaseSigning) {
    throw new GradleException("android/key.properties exists but is incomplete. Required keys: ${releaseSigningKeys.join(', ')}")
}
if (hasReleaseSigning && !rootProject.file(keystoreProperties['storeFile']).exists()) {
    throw new GradleException("Release keystore does not exist: ${keystoreProperties['storeFile']}")
}

def releaseSigningRequired = (project.findProperty('CAMPUS_REQUIRE_RELEASE_SIGNING') ?: 'false').toString().toBoolean()
if (releaseSigningRequired && !hasReleaseSigning) {
    throw new GradleException("Release signing is required. Create android/key.properties and provide the private keystore.")
}

def resolvedVersionCodeText = (project.findProperty('CAMPUS_VERSION_CODE') ?: '1').toString()
if (!(resolvedVersionCodeText ==~ /\d+/) || resolvedVersionCodeText.toInteger() < 1) {
    throw new GradleException("CAMPUS_VERSION_CODE must be a positive integer.")
}
def resolvedVersionName = (project.findProperty('CAMPUS_VERSION_NAME') ?: '1.0.0').toString().trim()
if (!(resolvedVersionName ==~ /[0-9A-Za-z][0-9A-Za-z._-]{0,49}/)) {
    throw new GradleException("CAMPUS_VERSION_NAME must be 1-50 characters using letters, digits, dot, underscore or hyphen.")
}

android {
    namespace = "com.xiaoyu.campus.parttime"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.xiaoyu.campus.parttime"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode resolvedVersionCodeText.toInteger()
        versionName resolvedVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
        manifestPlaceholders = [usesCleartextTraffic: "true"]
    }
    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile rootProject.file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }
    buildTypes {
        debug {
            manifestPlaceholders = [usesCleartextTraffic: "true"]
        }
        release {
            manifestPlaceholders = [usesCleartextTraffic: "false"]
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            } else {
                logger.warn("Release signing is not configured. Create android/key.properties outside git before building a distributable release APK.")
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
