# Test Environment Configuration

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:h2:mem:takeaway_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=USER;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.cangqiong.takeaway.entity,com.cangqiong.takeaway.campus.entity
mybatis.configuration.map-underscore-to-camel-case=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema-h2.sql
spring.sql.init.data-locations=classpath:db/data-h2.sql
spring.h2.console.enabled=false

jwt.secret=test_jwt_secret_key_for_integration_tests_2026
jwt.expiration=86400000

app.security.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

upload.storage-path=target/test-uploads/
upload.public-base-url=/api/files/
upload.allowed-extensions=jpg,jpeg,png,webp
upload.allowed-content-types=image/jpeg,image/png,image/webp
upload.max-size-bytes=5242880

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
