# Development Environment Configuration

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:cangqiong_takeaway}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:xyz12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# MyBatis
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.cangqiong.takeaway.entity,com.cangqiong.takeaway.campus.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# SQL Initialization
spring.sql.init.mode=never

# H2 Console
spring.h2.console.enabled=false

# JWT
jwt.secret=${JWT_SECRET_DEV:dev_jwt_secret_key_for_local_environment_2026}
jwt.expiration=86400000

# CORS
app.security.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

# Logging
logging.level.com.cangqiong.takeaway=debug
logging.level.org.springframework.web=debug

# File Upload Configuration
upload.storage-path=uploads/private/images/
upload.public-base-url=/api/files/
upload.allowed-extensions=jpg,jpeg,png,webp
upload.allowed-content-types=image/jpeg,image/png,image/webp
upload.max-size-bytes=5242880
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
