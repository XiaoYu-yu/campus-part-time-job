# Production Environment Configuration

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cangqiong_takeaway}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=never
spring.h2.console.enabled=false

# HikariCP Connection Pool
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# MyBatis
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.cangqiong.takeaway.entity
mybatis.configuration.map-underscore-to-camel-case=true

# JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.security.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}

# File Upload Configuration
upload.storage-path=${APP_UPLOAD_STORAGE_PATH:uploads/private/images/}
upload.public-base-url=/api/files/
upload.allowed-extensions=jpg,jpeg,png,webp
upload.allowed-content-types=image/jpeg,image/png,image/webp
upload.max-size-bytes=5242880

# Logging
logging.level.com.cangqiong.takeaway=info
logging.level.org.springframework.web=warn
