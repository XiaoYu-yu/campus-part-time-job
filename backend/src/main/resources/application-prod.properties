# Production Environment Configuration

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cangqiong_takeaway}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=${DB_USE_SSL:true}&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=never
spring.h2.console.enabled=false

# Production database schema is managed by Flyway.
# Keep baseline disabled by default. Only enable it for a verified existing
# manual schema, and set DB_FLYWAY_BASELINE_VERSION to the matching version.
spring.flyway.enabled=${DB_MIGRATION_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.baseline-on-migrate=${DB_FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=${DB_FLYWAY_BASELINE_VERSION:14}

# HikariCP Connection Pool
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# MyBatis
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.cangqiong.takeaway.entity,com.cangqiong.takeaway.campus.entity
mybatis.configuration.map-underscore-to-camel-case=true

# JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.security.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}

# File Upload Configuration
upload.storage-path=${APP_UPLOAD_STORAGE_PATH:uploads/private/images/}
upload.public-base-url=/api/files/
upload.allowed-extensions=jpg,jpeg,png,webp
upload.allowed-content-types=image/jpeg,image/png,image/webp
upload.max-size-bytes=5242880

# Logging
logging.level.com.cangqiong.takeaway=info
logging.level.org.springframework.web=warn
