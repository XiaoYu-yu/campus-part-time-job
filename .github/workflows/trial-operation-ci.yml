name: Trial Operation CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-compile:
    name: Backend compile
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile backend
        working-directory: backend
        run: .\mvnw.cmd -DskipTests compile

  frontend-build:
    name: Frontend build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_TENCENT_MAP_KEY: ci-placeholder-key
        run: npm run build

  sample-validation:
    name: Trial sample validation
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate trial-operation samples
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          powershell -ExecutionPolicy Bypass -File scripts\trial-operation\validate-samples.ps1
          $code = $LASTEXITCODE
          if ($code -eq 0) {
            Write-Host "Sample validation completed without warnings."
            exit 0
          }
          if ($code -eq 2) {
            Write-Warning "Sample validation completed with warnings only. Keeping CI green by design."
            exit 0
          }
          Write-Error "Sample validation failed with exit code $code."
          exit $code
